name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.9.0,<0.16"
      - run: ruff check server/ probe/

  # ── Server tests ─────────────────────────────────────────────────────────────
  test-server:
    name: Server tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: server/pyproject.toml
      - name: Install server + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run server tests
        run: pytest tests/ -v --tb=short --cov=whatisup --cov-report=term-missing
        env:
          SECRET_KEY: "ci-test-secret-32-chars-minimum-x"
          ENVIRONMENT: "test"

  # ── Alembic migration check ───────────────────────────────────────────────────
  test-migrations:
    name: Alembic migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: whatisup
          POSTGRES_PASSWORD: whatisup
          POSTGRES_DB: whatisup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: upgrade head
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://whatisup:whatisup@localhost:5432/whatisup_test
          SECRET_KEY: ci-test-secret-32-chars-minimum-x
          ENVIRONMENT: test
      - name: downgrade base
        run: alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://whatisup:whatisup@localhost:5432/whatisup_test
          SECRET_KEY: ci-test-secret-32-chars-minimum-x
          ENVIRONMENT: test

  # ── Probe tests ───────────────────────────────────────────────────────────────
  test-probe:
    name: Probe tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: probe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: probe/pyproject.toml
      - name: Install probe + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run probe tests
        run: pytest tests/ -v --tb=short
        env:
          CENTRAL_API_URL: "http://localhost:8000"
          PROBE_API_KEY: "wiu_ci_test_key_not_real"
