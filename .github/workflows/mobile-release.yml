name: mobile-release

# Build a debug Android APK on every push to main and a release-signed APK
# whenever a v* tag is pushed. The release APK is uploaded as an artefact and
# attached to the GitHub Release matching the tag.
#
# Required repository secrets (only used by the `release` job):
#   ANDROID_KEYSTORE_BASE64  — base64 of release.keystore
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'mobile/**'
      - '.github/workflows/mobile-release.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web bundle
        working-directory: frontend
        run: npm run build

      - name: Add Android platform if missing
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: whatisup-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web bundle
        working-directory: frontend
        run: npm run build

      - name: Sync Android project
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > frontend/android/app/release.keystore

      - name: Build signed release APK
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Attach APK to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: frontend/android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
