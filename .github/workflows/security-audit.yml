name: Dependency security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC

jobs:
  pip-audit-server:
    name: pip-audit (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install server + pip-audit
        run: pip install -e ".[dev]" pip-audit
      - name: Audit server dependencies
        run: pip-audit

  pip-audit-probe:
    name: pip-audit (probe)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: probe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install probe + pip-audit
        run: pip install -e ".[dev]" pip-audit
      - name: Audit probe dependencies
        run: pip-audit

  npm-audit-frontend:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
