# Pre-commit hooks — voir SECURITY.md §13 pour activation.
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files   # une fois pour valider l'existant

repos:
  # ─ Python lint + format ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ─ Secrets scanner ──────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─ Sanity checks ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=512']
      - id: check-yaml
        exclude: '^.*\.gh-template\.ya?ml$'
      - id: check-json
      - id: check-toml

  # ─ Bandit (Python security linter) ──────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '-q']
        files: ^(server|probe)/.*\.py$
        additional_dependencies: ["bandit[toml]"]
