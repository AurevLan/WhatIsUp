# Pre-commit hooks — voir SECURITY.md §13.
# Exécuté via Docker (zéro install hôte) :
#   tools/pre-commit/install.sh   # setup unique : git config + build image
#   git commit                    # déclenche les hooks automatiquement
#
# Aligné sur la CI (ci.yml) — `ruff check` uniquement, pas `ruff format`,
# pour ne pas diverger du contrôle effectivement bloquant côté CI.

# Fichiers exclus globalement : générés par Capacitor (resync à chaque build)
# et dossier de config IDE / build artefacts.
exclude: |
  (?x)^(
    frontend/android/.*|
    frontend/dist/.*|
    frontend/node_modules/.*|
    .*\.min\.(js|css)|
    server/alembic/versions/.*\.py
  )$

repos:
  # ─ Python lint (cohérent avec ci.yml) ───────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(server|probe)/.*\.py$

  # ─ Secrets scanner ──────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─ Sanity checks ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=512']
      - id: check-yaml
        # Templates GitLab/GitHub avec syntaxe non standard exclus si besoin
        exclude: '^.*\.gh-template\.ya?ml$'
      - id: check-json
      - id: check-toml

  # ─ Bandit — Python SAST ─────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # Skip B101 (assert_used) — légitime dans nos tests pytest.
        # --severity-level high : seuls les findings HIGH bloquent le commit.
        # Low/Medium remontent dans la sortie mais ne sont pas bloquants
        # (le code legacy en contient quelques-uns à traiter au fil de l'eau).
        args: ['--skip', 'B101', '--severity-level', 'high', '-q']
        files: ^(server|probe)/.*\.py$
        exclude: ^(server|probe)/tests/.*$
