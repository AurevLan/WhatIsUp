# WhatIsUp — Override : serveur + sonde centrale co-localisée
#
# Usage (via deploy.sh ou manuellement) :
#   docker compose -f docker-compose.prod.yml \
#                  -f docker-compose.central-probe.yml \
#                  --env-file .env up -d
#
# Ce fichier ajoute :
#   - Un volume partagé entre serveur et sonde pour l'échange de la clé API
#   - AUTO_REGISTER_PROBE=true au serveur (crée Central-Probe au premier démarrage)
#   - Le service probe-central qui lit sa clé depuis /shared/PROBE_API_KEY

services:
  server:
    volumes:
      - shared:/shared
    environment:
      AUTO_REGISTER_PROBE: "true"
      PROBE_LOCATION: ${PROBE_LOCATION:-Central Server}

  probe-central:
    build:
      context: ./probe
    volumes:
      - shared:/shared:ro
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ""           # lu depuis /shared/PROBE_API_KEY par l'entrypoint
      PROBE_NAME: "Central-Probe"
      PROBE_LOCATION: ${PROBE_LOCATION:-Central Server}
      HEARTBEAT_INTERVAL: "30"
      MAX_CONCURRENT_CHECKS: "20"
      LOG_LEVEL: INFO
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  shared:
