# WhatIsUp — Production stack
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Required env vars (see .env.example):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, SECRET_KEY, FERNET_KEY
#
# Optional: start a local probe after registering it via the API:
#   PROBE_API_KEY=wiu_... docker compose -f docker-compose.prod.yml --env-file .env --profile probe up -d probe

networks:
  backend:
    driver: bridge
    internal: true   # postgres/redis not reachable from outside
  frontend:
    driver: bridge   # server + nginx + frontend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatisup}
      POSTGRES_USER: ${POSTGRES_USER:-whatisup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatisup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whatisup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatisup}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      FERNET_KEY: ${FERNET_KEY:?FERNET_KEY must be set}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/whatisup.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # Co-located probe (optional) — start after registering via the API:
  #   PROBE_API_KEY=wiu_... docker compose -f docker-compose.prod.yml --env-file .env --profile probe up -d probe
  probe:
    build:
      context: ./probe
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: ${PROBE_NAME:-prod-probe}
      PROBE_LOCATION: ${PROBE_LOCATION:-Production}
      HEARTBEAT_INTERVAL: "30"
      MAX_CONCURRENT_CHECKS: "20"
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - probe

volumes:
  postgres_data:
  redis_data:
