# WhatIsUp — Stack complète
# Usage: docker compose --env-file .env up -d
#
# Variables requises dans .env (voir .env.example) :
#   POSTGRES_PASSWORD, REDIS_PASSWORD, SECRET_KEY, FERNET_KEY,
#   CORS_ALLOWED_ORIGINS
#
# On first boot, the server automatically:
#   - Creates admin@local with a random password (check: docker compose logs server)
#   - Registers Central-Probe and writes its API key to /shared/PROBE_API_KEY
#
# SSL: nginx/ssl/cert.pem + key.pem requis (générez-les avec deploy.sh ou openssl)
#
# Sonde co-localisée optionnelle :
#   PROBE_API_KEY=wiu_... docker compose --env-file .env --profile probe up -d probe

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatisup}
      POSTGRES_USER: ${POSTGRES_USER:-whatisup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatisup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - shared:/shared
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whatisup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatisup}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      FERNET_KEY: ${FERNET_KEY:?FERNET_KEY must be set}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      AUTO_REGISTER_PROBE: "true"
      PROBE_LOCATION: ${PROBE_LOCATION:-Central Server}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_AUTO_PROVISION: ${OIDC_AUTO_PROVISION:-true}
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/whatisup.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  # Sonde centrale co-localisée (optionnelle — profil "central-probe")
  # Activée automatiquement par deploy.sh option 1
  probe-local:
    build:
      context: ./probe
    volumes:
      - shared:/shared:ro
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: "Central-Probe"
      PROBE_LOCATION: ${PROBE_LOCATION:-Central Server}
      HEARTBEAT_INTERVAL: "15"
    dns:
      - ${PROBE_DNS_1:-8.8.8.8}
      - ${PROBE_DNS_2:-8.8.4.4}
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    shm_size: '256mb'
    profiles:
      - central-probe

  # Sonde co-localisée optionnelle (profil "probe")
  probe:
    build:
      context: ./probe
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: ${PROBE_NAME:-local-probe}
      PROBE_LOCATION: ${PROBE_LOCATION:-Local}
      HEARTBEAT_INTERVAL: "30"
      MAX_CONCURRENT_CHECKS: "10"
    dns:
      - ${PROBE_DNS_1:-8.8.8.8}
      - ${PROBE_DNS_2:-8.8.4.4}
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    shm_size: '256mb'
    profiles:
      - probe

  # ── Recette / tests d'intégration (profil "recette") ─────────────────────
  # Usage: docker compose --env-file .env --profile recette run --rm recette
  recette:
    build:
      context: ./server
      dockerfile: Dockerfile.recette
    environment:
      RECETTE_BASE_URL: http://server:8000
      ADMIN_EMAIL: ${RECETTE_EMAIL:-recette@test.local}
      ADMIN_PASSWORD: ${RECETTE_PASSWORD:-RecettePass1!}
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - recette

volumes:
  postgres_data:
  redis_data:
  shared:
