# WhatIsUp — Central platform (development)
# Usage: docker compose up -d
#
# First-time probe setup:
#   1. POST /api/v1/auth/register  →  create superadmin account
#   2. POST /api/v1/probes/register  →  note the returned api_key
#   3. Set PROBE_API_KEY in .env (or export it) then:
#        docker compose --profile probe up -d probe-local
#
# Access:
#   Frontend  → http://localhost:5173
#   API       → http://localhost:8000
#   API docs  → http://localhost:8000/api/docs

networks:
  whatisup:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatisup
      POSTGRES_USER: whatisup
      POSTGRES_PASSWORD: whatisup_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatisup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatisup"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - whatisup
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://whatisup:whatisup_dev_password@postgres:5432/whatisup
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
    networks:
      - whatisup
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://server:8000
    networks:
      - whatisup
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      server:
        condition: service_healthy

  # Local probe — requires PROBE_API_KEY to be set
  # Start after registering a probe via the API:
  #   docker compose --profile probe up -d probe-local
  probe-local:
    build:
      context: ./probe
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: ${PROBE_NAME:-local-probe}
      PROBE_LOCATION: ${PROBE_LOCATION:-Local Development}
      HEARTBEAT_INTERVAL: "15"
    networks:
      - whatisup
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - probe

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
