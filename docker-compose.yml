# WhatIsUp — Central platform (development)
# Usage: docker compose up -d
#
# Access:
#   Frontend  → http://localhost:5173
#   API       → http://localhost:8000
#   API docs  → http://localhost:8000/api/docs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatisup
      POSTGRES_USER: whatisup
      POSTGRES_PASSWORD: whatisup_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatisup"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://whatisup:whatisup_dev_password@postgres:5432/whatisup
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn whatisup.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Proxy target: frontend container reaches API via Docker network
      VITE_API_TARGET: http://server:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - server

  # Local probe — start with: docker compose --profile probe up -d
  probe-local:
    build:
      context: ./probe
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: ${PROBE_NAME:-local-probe}
      PROBE_LOCATION: ${PROBE_LOCATION:-Local Development}
      HEARTBEAT_INTERVAL: "15"
    depends_on:
      - server
    restart: unless-stopped
    profiles:
      - probe

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
