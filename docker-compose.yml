# WhatIsUp — Central platform (development)
# Usage: docker compose up -d
#
# On first boot, the server automatically:
#   - Creates admin@local with a random password (check: docker compose logs server)
#   - Registers Central-Probe and writes its API key to /shared/PROBE_API_KEY
#
# Access:
#   Frontend  → http://localhost:5173
#   API       → http://localhost:8000
#   API docs  → http://localhost:8000/api/docs

networks:
  whatisup:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatisup
      POSTGRES_USER: whatisup
      POSTGRES_PASSWORD: whatisup_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatisup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatisup"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - whatisup
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - shared:/shared
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://whatisup:whatisup_dev_password@postgres:5432/whatisup
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
      AUTO_REGISTER_PROBE: "true"
      PROBE_LOCATION: "Central Server"
    networks:
      - whatisup
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://server:8000
    networks:
      - whatisup
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      server:
        condition: service_healthy

  # Central probe — started automatically, reads its API key from /shared/PROBE_API_KEY
  probe-local:
    build:
      context: ./probe
    volumes:
      - shared:/shared:ro
    environment:
      CENTRAL_API_URL: http://server:8000
      PROBE_API_KEY: ${PROBE_API_KEY:-}
      PROBE_NAME: "Central-Probe"
      PROBE_LOCATION: "Central Server"
      HEARTBEAT_INTERVAL: "15"
    networks:
      - whatisup
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  shared:
