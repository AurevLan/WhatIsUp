<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="400" height="560" rx="12" fill="#1e1e2e"/>

  <!-- Extension popup header -->
  <rect x="0" y="0" width="400" height="56" rx="12" fill="#181825"/>
  <rect x="0" y="44" width="400" height="12" fill="#181825"/>

  <!-- Logo + title -->
  <circle cx="28" cy="28" r="12" fill="#89b4fa"/>
  <text x="22" y="33" font-size="13" font-weight="700" fill="#1e1e2e">W</text>
  <text x="46" y="25" font-size="14" font-weight="700" fill="#cdd6f4">WhatIsUp Recorder</text>
  <text x="46" y="40" font-size="10" fill="#6c7086">v0.6.0</text>

  <!-- Status bar -->
  <rect x="16" y="68" width="368" height="36" rx="8" fill="#181825"/>
  <!-- Red dot (recording) -->
  <circle cx="32" cy="86" r="6" fill="#f38ba8"/>
  <text x="44" y="90" font-size="12" font-weight="600" fill="#f38ba8">Recording…</text>
  <text x="260" y="90" font-size="11" fill="#6c7086">7 steps</text>
  <rect x="320" y="75" width="52" height="22" rx="6" fill="#f38ba8" fill-opacity="0.15"/>
  <text x="332" y="90" font-size="11" fill="#f38ba8">Stop</text>

  <!-- Step list -->
  <text x="16" y="126" font-size="11" font-weight="600" fill="#6c7086" letter-spacing="0.5">RECORDED STEPS</text>

  <!-- Step 1 -->
  <rect x="16" y="134" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="134" width="4" height="44" rx="2" fill="#89b4fa"/>
  <text x="28" y="151" font-size="10" fill="#6c7086">1</text>
  <rect x="42" y="140" width="52" height="18" rx="4" fill="#89b4fa" fill-opacity="0.2"/>
  <text x="47" y="153" font-size="10" font-weight="600" fill="#89b4fa">navigate</text>
  <text x="104" y="153" font-size="10" fill="#cdd6f4">https://app.example.com/login</text>
  <text x="28" y="169" font-size="10" fill="#6c7086">Navigate to login page</text>

  <!-- Step 2 -->
  <rect x="16" y="184" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="184" width="4" height="44" rx="2" fill="#a6e3a1"/>
  <text x="28" y="201" font-size="10" fill="#6c7086">2</text>
  <rect x="42" y="190" width="28" height="18" rx="4" fill="#a6e3a1" fill-opacity="0.2"/>
  <text x="47" y="203" font-size="10" font-weight="600" fill="#a6e3a1">fill</text>
  <text x="80" y="203" font-size="10" fill="#cdd6f4">#email → user@example.com</text>
  <text x="28" y="219" font-size="10" fill="#6c7086">Fill email field</text>

  <!-- Step 3 — password (secret) -->
  <rect x="16" y="234" width="368" height="44" rx="6" fill="#313244"/>
  <rect x="16" y="234" width="4" height="44" rx="2" fill="#fab387"/>
  <text x="28" y="251" font-size="10" fill="#6c7086">3</text>
  <rect x="42" y="240" width="28" height="18" rx="4" fill="#fab387" fill-opacity="0.2"/>
  <text x="47" y="253" font-size="10" font-weight="600" fill="#fab387">fill</text>
  <text x="80" y="253" font-size="10" fill="#cdd6f4">#password → {{password_1}}</text>
  <!-- Lock icon badge -->
  <rect x="310" y="240" width="66" height="18" rx="4" fill="#fab387" fill-opacity="0.15"/>
  <text x="317" y="253" font-size="9" fill="#fab387">🔒 encrypted</text>
  <text x="28" y="269" font-size="10" fill="#6c7086">Fill password field (secret stored separately)</text>

  <!-- Step 4 -->
  <rect x="16" y="284" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="284" width="4" height="44" rx="2" fill="#cba6f7"/>
  <text x="28" y="301" font-size="10" fill="#6c7086">4</text>
  <rect x="42" y="290" width="32" height="18" rx="4" fill="#cba6f7" fill-opacity="0.2"/>
  <text x="47" y="303" font-size="10" font-weight="600" fill="#cba6f7">click</text>
  <text x="84" y="303" font-size="10" fill="#cdd6f4">button[type=submit]</text>
  <text x="28" y="319" font-size="10" fill="#6c7086">Click login button</text>

  <!-- Step 5 -->
  <rect x="16" y="334" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="334" width="4" height="44" rx="2" fill="#89b4fa"/>
  <text x="28" y="351" font-size="10" fill="#6c7086">5</text>
  <rect x="42" y="340" width="52" height="18" rx="4" fill="#89b4fa" fill-opacity="0.2"/>
  <text x="47" y="353" font-size="10" font-weight="600" fill="#89b4fa">navigate</text>
  <text x="104" y="353" font-size="10" fill="#cdd6f4">https://app.example.com/dashboard</text>
  <text x="28" y="369" font-size="10" fill="#6c7086">Navigate to dashboard</text>

  <!-- Step 6 -->
  <rect x="16" y="384" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="384" width="4" height="44" rx="2" fill="#94e2d5"/>
  <text x="28" y="401" font-size="10" fill="#6c7086">6</text>
  <rect x="42" y="390" width="38" height="18" rx="4" fill="#94e2d5" fill-opacity="0.2"/>
  <text x="47" y="403" font-size="10" font-weight="600" fill="#94e2d5">assert</text>
  <text x="90" y="403" font-size="10" fill="#cdd6f4">h1 → Welcome back</text>
  <text x="28" y="419" font-size="10" fill="#6c7086">Assert page heading</text>

  <!-- Step 7 -->
  <rect x="16" y="434" width="368" height="44" rx="6" fill="#181825"/>
  <rect x="16" y="434" width="4" height="44" rx="2" fill="#f9e2af"/>
  <text x="28" y="451" font-size="10" fill="#6c7086">7</text>
  <rect x="42" y="440" width="54" height="18" rx="4" fill="#f9e2af" fill-opacity="0.2"/>
  <text x="47" y="453" font-size="10" font-weight="600" fill="#f9e2af">screenshot</text>
  <text x="106" y="453" font-size="10" fill="#cdd6f4">Capture final state</text>
  <text x="28" y="469" font-size="10" fill="#6c7086">Take screenshot</text>

  <!-- Send button -->
  <rect x="16" y="490" width="368" height="40" rx="8" fill="#89b4fa"/>
  <text x="184" y="515" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">Send to WhatIsUp</text>

  <!-- Footer -->
  <text x="200" y="545" font-size="10" fill="#45475a" text-anchor="middle">7 steps · 1 secret variable · Fernet-encrypted at rest</text>
</svg>
