<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0f172a"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="720" fill="#0f172a"/>
  <rect x="0" y="0" width="220" height="720" fill="#1e293b" opacity="0.5"/>
  <text x="50" y="33" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">WhatIsUp</text>
  <rect x="20" y="22" width="10" height="10" rx="2" fill="#3b82f6"/>
  <rect x="34" y="22" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="32" y="84" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">  Dashboard</text>
  <text x="32" y="116" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">  Monitors</text>
  <rect x="8" y="128" width="204" height="36" rx="8" fill="#3b82f6" opacity="0.2"/>
  <text x="32" y="152" font-family="system-ui,sans-serif" font-size="13" fill="#3b82f6">● Probes</text>
  <text x="32" y="184" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">  Alerts</text>

  <!-- Main -->
  <rect x="220" y="0" width="980" height="720" fill="#0f172a"/>

  <!-- Header -->
  <text x="248" y="48" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Probes</text>
  <text x="248" y="68" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Remote monitoring agents</text>
  <rect x="1060" y="34" width="120" height="32" rx="8" fill="#3b82f6"/>
  <text x="1120" y="55" font-family="system-ui,sans-serif" font-size="13" fill="#fff" text-anchor="middle">+ Register</text>

  <!-- Tabs -->
  <text x="248" y="108" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Liste</text>
  <text x="300" y="108" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Carte</text>
  <rect x="300" y="112" width="36" height="2" rx="1" fill="#3b82f6"/>
  <rect x="248" y="114" width="932" height="1" fill="#1e293b"/>

  <!-- Map area -->
  <rect x="248" y="126" width="932" height="440" rx="12" fill="#1e3a5f"/>

  <!-- Simplified world map outlines (Europe + Americas contours) -->
  <!-- Europe -->
  <path d="M620,160 L640,155 L660,160 L670,175 L665,195 L650,205 L640,210 L630,200 L615,195 L610,180 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Scandinavia -->
  <path d="M640,130 L650,125 L660,130 L658,150 L645,155 L638,145 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- UK -->
  <path d="M600,160 L612,155 L614,170 L606,178 L597,172 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Simplified North America -->
  <path d="M230,160 L340,145 L380,160 L390,200 L370,240 L340,260 L300,270 L260,260 L230,240 L215,210 L220,180 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Simplified Africa -->
  <path d="M620,230 L660,220 L690,240 L700,290 L680,340 L650,360 L620,350 L600,320 L598,270 L610,240 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Asia simplified -->
  <path d="M720,140 L820,130 L920,145 L950,180 L940,220 L900,230 L840,225 L780,220 L740,205 L710,185 L715,160 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Japan -->
  <path d="M970,160 L985,155 L990,168 L980,178 L968,172 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- South America -->
  <path d="M310,290 L360,280 L390,300 L395,360 L370,420 L340,450 L310,440 L285,400 L280,340 L290,300 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>
  <!-- Australia -->
  <path d="M890,320 L960,310 L990,335 L985,380 L950,400 L900,395 L875,370 L878,340 Z"
        fill="#1e4d7b" stroke="#2563eb" stroke-width="0.5"/>

  <!-- Latitude/longitude grid -->
  <line x1="248" y1="246" x2="1180" y2="246" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>
  <line x1="248" y1="346" x2="1180" y2="346" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>
  <line x1="248" y1="446" x2="1180" y2="446" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>
  <line x1="448" y1="126" x2="448" y2="566" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>
  <line x1="714" y1="126" x2="714" y2="566" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>
  <line x1="980" y1="126" x2="980" y2="566" stroke="#2563eb" stroke-width="0.3" opacity="0.4"/>

  <!-- OpenStreetMap attribution -->
  <text x="1150" y="558" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="end">© OpenStreetMap</text>

  <!-- Probe markers -->
  <!-- Paris (online) -->
  <circle cx="630" cy="178" r="14" fill="#10b981" opacity="0.2" filter="url(#glow-green)"/>
  <circle cx="630" cy="178" r="8" fill="#10b981" stroke="#6ee7b7" stroke-width="2"/>
  <!-- Popup Paris -->
  <rect x="642" y="148" width="160" height="74" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="642" y="148" width="160" height="4" rx="2" fill="#10b981"/>
  <text x="652" y="166" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Central-Probe</text>
  <text x="652" y="181" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Central Server</text>
  <circle cx="652" cy="194" r="4" fill="#10b981"/>
  <text x="661" y="197" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">Online</text>
  <text x="652" y="211" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Vu il y a 8 s</text>
  <!-- Caret -->
  <polygon points="642,178 650,174 650,182" fill="#1e293b"/>

  <!-- New York (online) -->
  <circle cx="320" cy="195" r="12" fill="#10b981" opacity="0.15" filter="url(#glow-green)"/>
  <circle cx="320" cy="195" r="7" fill="#10b981" stroke="#6ee7b7" stroke-width="2"/>
  <text x="332" y="191" font-family="system-ui,sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">New York</text>
  <text x="332" y="203" font-family="system-ui,sans-serif" font-size="10" fill="#10b981">● Online</text>

  <!-- Tokyo (online) -->
  <circle cx="960" cy="185" r="12" fill="#10b981" opacity="0.15" filter="url(#glow-green)"/>
  <circle cx="960" cy="185" r="7" fill="#10b981" stroke="#6ee7b7" stroke-width="2"/>
  <text x="972" y="181" font-family="system-ui,sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">Tokyo</text>
  <text x="972" y="193" font-family="system-ui,sans-serif" font-size="10" fill="#10b981">● Online</text>

  <!-- São Paulo (offline) -->
  <circle cx="355" cy="370" r="12" fill="#ef4444" opacity="0.15" filter="url(#glow-red)"/>
  <circle cx="355" cy="370" r="7" fill="#ef4444" stroke="#fca5a5" stroke-width="2"/>
  <text x="367" y="366" font-family="system-ui,sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">São Paulo</text>
  <text x="367" y="378" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444">● Offline</text>

  <!-- Sydney (online) -->
  <circle cx="935" cy="380" r="12" fill="#10b981" opacity="0.15" filter="url(#glow-green)"/>
  <circle cx="935" cy="380" r="7" fill="#10b981" stroke="#6ee7b7" stroke-width="2"/>
  <text x="947" y="376" font-family="system-ui,sans-serif" font-size="10" fill="#f1f5f9" font-weight="600">Sydney</text>
  <text x="947" y="388" font-family="system-ui,sans-serif" font-size="10" fill="#10b981">● Online</text>

  <!-- Probes without coords -->
  <rect x="248" y="582" width="932" height="52" rx="10" fill="#1e293b"/>
  <text x="268" y="604" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Sondes non localisées</text>
  <circle cx="276" cy="626" r="5" fill="#10b981"/>
  <text x="290" y="630" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#f1f5f9">probe-backup-1</text>
  <text x="410" y="630" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Backup Server — </text>
  <text x="510" y="630" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Coordonnées non renseignées</text>
  <rect x="1080" y="614" width="90" height="24" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="1125" y="631" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">✏️ Edit</text>

  <!-- Probe stats bar -->
  <rect x="248" y="650" width="932" height="56" rx="10" fill="#1e293b"/>
  <text x="268" y="676" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">6 sondes au total</text>
  <circle cx="395" cy="673" r="5" fill="#10b981"/>
  <text x="406" y="677" font-family="system-ui,sans-serif" font-size="12" fill="#10b981">5 en ligne</text>
  <circle cx="480" cy="673" r="5" fill="#ef4444"/>
  <text x="491" y="677" font-family="system-ui,sans-serif" font-size="12" fill="#ef4444">1 hors ligne</text>
  <text x="268" y="696" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Rafraîchissement automatique · Cliquez sur un marker pour les détails</text>
</svg>
