  <rect x="680" y="348" width="28" height="16" rx="3" fill="#4f9cf9" fill-opacity="0.15"/>
  <text x="694" y="359" font-family="JetBrains Mono, monospace" font-size="10" fill="#4f9cf9" text-anchor="middle">fill</text>
  <text x="716" y="359" font-family="JetBrains Mono, monospace" font-size="11" fill="#e4ecf4">email field</text>
  <text x="1158" y="359" font-family="JetBrains Mono, monospace" font-size="11" fill="#4d6070" text-anchor="end">running…</text>

  <!-- Rows 5-7 greyed out (pending) -->
