  <text x="20" y="212" font-family="system-ui, sans-serif" font-size="13" fill="#8899aa">Status Pages</text>
  <text x="20" y="244" font-family="system-ui, sans-serif" font-size="13" fill="#8899aa">Incidents</text>
  <text x="20" y="276" font-family="system-ui, sans-serif" font-size="13" fill="#8899aa">Maintenance</text>

  <!-- Sidebar bottom -->
