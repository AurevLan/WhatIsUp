  <line x1="600" y1="354" x2="610" y2="344" stroke="#4f9cf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="610" y1="344" x2="613" y2="348" stroke="#4f9cf9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="600" y1="354" x2="613" y2="348" stroke="#4f9cf9" stroke-width="1.5" stroke-linecap="round"/>

