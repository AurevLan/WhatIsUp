  <text x="319" y="196" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#4f9cf9" text-anchor="middle">navigate</text>
  <!-- Step value -->
  <text x="356" y="196" font-family="JetBrains Mono, monospace" font-size="11" fill="#8899aa">https://shop.example.com</text>

  <!-- Step 2: wait_element -->
  <rect x="244" y="222" width="380" height="52" fill="#131920"/>
  <rect x="244" y="273" width="380" height="1" fill="#1e2d3d"/>
  <rect x="260" y="235" width="22" height="22" rx="4" fill="#1a2230"/>
  <text x="271" y="250" font-family="JetBrains Mono, monospace" font-size="11" fill="#4d6070" text-anchor="middle">2</text>
