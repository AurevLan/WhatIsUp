<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="675" fill="#0d1829"/>
  <text x="28" y="38" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#818cf8">WhatIsUp</text>
  <rect x="12" y="58" width="196" height="36" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="32" cy="76" r="4" fill="#818cf8"/>
  <text x="46" y="80" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">Monitors</text>
  <text x="28" y="120" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Probes</text>
  <text x="28" y="148" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Alerts</text>

  <!-- Main content -->
  <rect x="220" y="0" width="980" height="675" fill="#0f172a"/>

  <!-- Header bar -->
  <rect x="220" y="0" width="980" height="56" fill="#0d1829" stroke="#1e293b" stroke-width="1"/>
  <text x="244" y="24" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Monitors / Mail Proton / Scenario</text>
  <text x="244" y="44" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">Scenario Builder</text>

  <!-- Toolbar -->
  <rect x="820" y="13" width="110" height="30" rx="7" fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="875" y="33" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="middle">⬆ Import JSON</text>
  <rect x="940" y="13" width="110" height="30" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="995" y="33" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">⬇ Export JSON</text>
  <rect x="1060" y="13" width="120" height="30" rx="7" fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="1120" y="33" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="middle">▶ Run dry-run</text>

  <!-- Two-column layout -->
  <!-- Left: step list -->
  <!-- Step 1: navigate -->
  <rect x="236" y="72" width="620" height="68" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Drag handle -->
  <text x="254" y="112" font-family="system-ui, sans-serif" font-size="16" fill="#334155">⋮⋮</text>
  <!-- Step number -->
  <rect x="278" y="86" width="24" height="24" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="290" y="103" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">1</text>
  <!-- Icon + label -->
  <rect x="314" y="86" width="72" height="22" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="350" y="101" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">🌐 navigate</text>
  <!-- Label -->
  <text x="400" y="98" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Open login page</text>
  <text x="400" y="116" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-family="monospace">https://mail.proton.me/login</text>
  <!-- Options arrow -->
  <text x="826" y="108" font-family="system-ui, sans-serif" font-size="18" fill="#475569">›</text>

  <!-- Step 2: fill (highlighted / expanded) -->
  <rect x="236" y="150" width="620" height="100" rx="10" fill="#1e2a3a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="254" y="206" font-family="system-ui, sans-serif" font-size="16" fill="#334155">⋮⋮</text>
  <rect x="278" y="162" width="24" height="24" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="290" y="179" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">2</text>
  <rect x="314" y="162" width="48" height="22" rx="4" fill="#8b5cf6" opacity="0.2"/>
  <text x="338" y="177" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle">✏ fill</text>
  <text x="376" y="174" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Enter credentials</text>
  <text x="376" y="192" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">#username · {{EMAIL}}</text>
  <!-- Expanded options -->
  <rect x="278" y="208" width="560" height="34" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="296" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Timeout (ms)</text>
  <rect x="380" y="213" width="80" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="420" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">5000</text>
  <text x="478" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Continue if fails</text>
  <rect x="580" y="218" width="36" height="14" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="590" cy="225" r="6" fill="#475569"/>

  <!-- Step 3: click -->
  <rect x="236" y="260" width="620" height="68" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="254" y="300" font-family="system-ui, sans-serif" font-size="16" fill="#334155">⋮⋮</text>
  <rect x="278" y="272" width="24" height="24" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="290" y="289" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">3</text>
  <rect x="314" y="272" width="48" height="22" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="338" y="287" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">👆 click</text>
  <text x="376" y="284" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Submit login</text>
  <text x="376" y="302" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">button[type="submit"]</text>

  <!-- Step 4: assert -->
  <rect x="236" y="338" width="620" height="68" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="254" y="378" font-family="system-ui, sans-serif" font-size="16" fill="#334155">⋮⋮</text>
  <rect x="278" y="350" width="24" height="24" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="290" y="367" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">4</text>
  <rect x="314" y="350" width="60" height="22" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="344" y="365" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">✓ assert</text>
  <text x="388" y="362" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Check inbox visible</text>
  <text x="388" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">.inbox-list · contains "Inbox"</text>

  <!-- Step 5: screenshot -->
  <rect x="236" y="416" width="620" height="68" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="254" y="456" font-family="system-ui, sans-serif" font-size="16" fill="#334155">⋮⋮</text>
  <rect x="278" y="428" width="24" height="24" rx="6" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="290" y="445" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">5</text>
  <rect x="314" y="428" width="80" height="22" rx="4" fill="#ec4899" opacity="0.15"/>
  <text x="354" y="443" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f9a8d4" text-anchor="middle">📷 screenshot</text>
  <text x="410" y="440" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Final state</text>
  <text x="410" y="458" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">inbox-logged-in.png</text>

  <!-- Add step button -->
  <rect x="236" y="498" width="620" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="546" y="523" font-family="system-ui, sans-serif" font-size="13" fill="#475569" text-anchor="middle">+ Add a step</text>

  <!-- Variables section -->
  <rect x="236" y="552" width="620" height="78" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="256" y="574" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Variables</text>
  <text x="820" y="574" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="end">+ Add variable</text>
  <!-- var row -->
  <rect x="256" y="582" width="140" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="326" y="601" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">EMAIL</text>
  <rect x="408" y="582" width="200" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="508" y="601" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">user@example.com</text>
  <rect x="620" y="582" width="200" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="720" y="601" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">••••••••</text>

  <!-- Right panel: step palette -->
  <rect x="876" y="68" width="304" height="560" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="896" y="94" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">STEP TYPES</text>

  <!-- Palette grid: 2 cols x 5 rows -->
  <!-- Row 1 -->
  <rect x="892" y="104" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="956" y="126" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">🌐</text>
  <text x="956" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Navigate</text>

  <rect x="1032" y="104" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1096" y="126" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">👆</text>
  <text x="1096" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Click</text>

  <!-- Row 2 -->
  <rect x="892" y="164" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="956" y="186" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">✏</text>
  <text x="956" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Fill</text>

  <rect x="1032" y="164" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1096" y="186" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">🔽</text>
  <text x="1096" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Select</text>

  <!-- Row 3 -->
  <rect x="892" y="224" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="956" y="246" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">✓</text>
  <text x="956" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Assert text</text>

  <rect x="1032" y="224" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1096" y="246" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">👁</text>
  <text x="1096" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Assert visible</text>

  <!-- Row 4 -->
  <rect x="892" y="284" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="956" y="306" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">⏳</text>
  <text x="956" y="325" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Wait</text>

  <rect x="1032" y="284" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1096" y="306" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">📋</text>
  <text x="1096" y="325" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Extract</text>

  <!-- Row 5 -->
  <rect x="892" y="344" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="956" y="366" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">📷</text>
  <text x="956" y="385" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Screenshot</text>

  <rect x="1032" y="344" width="128" height="52" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1096" y="366" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">🖱</text>
  <text x="1096" y="385" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Scroll</text>

  <!-- Templates section in right panel -->
  <line x1="892" y1="412" x2="1160" y2="412" stroke="#334155" stroke-width="1"/>
  <text x="896" y="434" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">TEMPLATES</text>

  <rect x="892" y="446" width="268" height="46" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="910" y="466" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">🔐 Login flow</text>
  <text x="910" y="482" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Navigate · Fill · Click · Assert</text>

  <rect x="892" y="500" width="268" height="46" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="910" y="520" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">🔍 Search flow</text>
  <text x="910" y="536" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Navigate · Fill · Click · Assert</text>

  <rect x="892" y="554" width="268" height="46" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="910" y="574" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">🛒 E-commerce cart</text>
  <text x="910" y="590" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Navigate · Click · Assert · Screenshot</text>
</svg>
