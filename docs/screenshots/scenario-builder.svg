  <text x="329" y="248" font-family="JetBrains Mono, monospace" font-size="10" fill="#8899aa" text-anchor="middle">wait_element</text>
  <text x="377" y="248" font-family="JetBrains Mono, monospace" font-size="11" fill="#8899aa">.hero</text>

  <!-- Step 3: click -->
  <rect x="244" y="274" width="380" height="52" fill="#131920"/>
  <rect x="244" y="325" width="380" height="1" fill="#1e2d3d"/>
  <rect x="260" y="287" width="22" height="22" rx="4" fill="#1a2230"/>
