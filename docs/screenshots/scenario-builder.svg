  <rect x="244" y="326" width="3" height="52" fill="#4f9cf9"/>
  <rect x="244" y="377" width="380" height="1" fill="#1e2d3d"/>
  <rect x="260" y="339" width="22" height="22" rx="4" fill="#4f9cf9" fill-opacity="0.2"/>
