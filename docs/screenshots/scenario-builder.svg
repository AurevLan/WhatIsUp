  <text x="680" y="403" font-family="JetBrains Mono, monospace" font-size="10" fill="#4d6070">fill · password</text>

  <rect x="640" y="420" width="538" height="42" fill="#131920"/>
  <rect x="640" y="461" width="538" height="1" fill="#1e2d3d"/>
  <circle cx="666" cy="441" r="5" fill="none" stroke="#1e2d3d" stroke-width="1.5"/>
  <text x="680" y="445" font-family="JetBrains Mono, monospace" font-size="10" fill="#4d6070">assert_text · "Order confirmed"</text>

  <rect x="640" y="462" width="538" height="42" fill="#131920"/>
  <rect x="640" y="503" width="538" height="1" fill="#1e2d3d"/>
  <circle cx="666" cy="483" r="5" fill="none" stroke="#1e2d3d" stroke-width="1.5"/>
  <text x="680" y="487" font-family="JetBrains Mono, monospace" font-size="10" fill="#4d6070">screenshot</text>

  <!-- Screenshot preview area -->
