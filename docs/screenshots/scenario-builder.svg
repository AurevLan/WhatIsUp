  <rect x="674" y="568" width="160" height="8" rx="2" fill="#0c1117"/>
  <rect x="674" y="582" width="100" height="8" rx="2" fill="#0c1117"/>
  <rect x="904" y="550" width="240" height="54" rx="4" fill="#0c1117"/>
  <!-- tiny ui elements in mock -->
