  <text x="760" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#8899aa">.hero</text>
  <text x="1158" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399" text-anchor="end">88ms</text>

  <!-- Result row 3 -->
  <rect x="640" y="294" width="538" height="42" fill="#131920"/>
  <rect x="640" y="335" width="538" height="1" fill="#1e2d3d"/>
  <circle cx="666" cy="315" r="5" fill="#34d399"/>
  <rect x="680" y="306" width="32" height="16" rx="3" fill="#1a2230"/>
  <text x="696" y="317" font-family="JetBrains Mono, monospace" font-size="10" fill="#8899aa" text-anchor="middle">click</text>
  <text x="720" y="317" font-family="JetBrains Mono, monospace" font-size="11" fill="#8899aa">"Add to cart"</text>
  <text x="1158" y="317" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399" text-anchor="end">156ms</text>

  <!-- Result row 4 (in progress / current selected) -->
  <rect x="640" y="336" width="538" height="42" fill="#4f9cf9" fill-opacity="0.05"/>
  <rect x="640" y="377" width="538" height="1" fill="#1e2d3d"/>
  <!-- spinner circle -->
