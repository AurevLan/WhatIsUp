  <rect x="640" y="293" width="538" height="1" fill="#1e2d3d"/>
  <circle cx="666" cy="273" r="5" fill="#34d399"/>
  <rect x="680" y="264" width="72" height="16" rx="3" fill="#1a2230"/>
