  <text x="326" y="31" font-family="system-ui, sans-serif" font-size="13" fill="#4d6070">checkout-flow</text>
  <text x="425" y="31" font-family="system-ui, sans-serif" font-size="13" fill="#4d6070"> / </text>
  <text x="441" y="31" font-family="system-ui, sans-serif" font-size="13" fill="#e4ecf4">Scenario Builder</text>

