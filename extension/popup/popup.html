<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatIsUp Recorder</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        min-height: 200px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #111827;
        color: #f3f4f6;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid #1f2937;
        background: #0f172a;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        color: #60a5fa;
      }

      .logo svg {
        color: #3b82f6;
      }

      .settings-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #6b7280;
        padding: 4px;
        border-radius: 4px;
        display: flex;
      }

      .settings-btn:hover {
        color: #9ca3af;
        background: #1f2937;
      }

      /* Controls */
      .controls {
        padding: 12px 14px;
        display: flex;
        gap: 8px;
        align-items: center;
        border-bottom: 1px solid #1f2937;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: background 0.15s;
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-record {
        background: #dc2626;
        color: #fff;
      }

      .btn-record:hover:not(:disabled) {
        background: #b91c1c;
      }

      .btn-record.recording {
        background: #7f1d1d;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .btn-secondary {
        background: #1f2937;
        color: #d1d5db;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #374151;
      }

      .btn-primary {
        background: #2563eb;
        color: #fff;
        margin-left: auto;
      }

      .btn-primary:hover:not(:disabled) {
        background: #1d4ed8;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }

      /* Steps list */
      .steps-header {
        padding: 8px 14px 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #6b7280;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .steps-list {
        max-height: 260px;
        overflow-y: auto;
        padding: 0 14px 4px;
      }

      .step-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        margin-bottom: 3px;
        background: #1f2937;
        border: 1px solid #374151;
        group: true;
      }

      .step-icon {
        font-size: 14px;
        flex-shrink: 0;
        width: 18px;
        text-align: center;
      }

      .step-label {
        flex: 1;
        font-size: 12px;
        color: #d1d5db;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .step-remove {
        background: none;
        border: none;
        cursor: pointer;
        color: #4b5563;
        padding: 2px;
        border-radius: 3px;
        font-size: 14px;
        line-height: 1;
        flex-shrink: 0;
        display: none;
      }

      .step-item:hover .step-remove {
        display: block;
      }

      .step-remove:hover {
        color: #ef4444;
        background: #3f1515;
      }

      /* Empty state */
      .empty {
        padding: 24px 14px;
        text-align: center;
        color: #4b5563;
        font-size: 12px;
        line-height: 1.6;
      }

      /* Send panel */
      .send-panel {
        border-top: 1px solid #1f2937;
        padding: 12px 14px;
      }

      .send-panel input {
        width: 100%;
        padding: 7px 10px;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 6px;
        color: #f3f4f6;
        font-size: 12px;
        margin-bottom: 8px;
        outline: none;
      }

      .send-panel input:focus {
        border-color: #3b82f6;
      }

      .send-panel input::placeholder {
        color: #6b7280;
      }

      .send-row {
        display: flex;
        gap: 8px;
      }

      .status-msg {
        padding: 8px 14px;
        font-size: 12px;
        border-top: 1px solid #1f2937;
      }

      .status-ok {
        color: #34d399;
      }

      .status-err {
        color: #f87171;
      }

      /* Scrollbar */
      .steps-list::-webkit-scrollbar {
        width: 4px;
      }

      .steps-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .steps-list::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        WhatIsUp Recorder
      </div>
      <button class="settings-btn" id="settingsBtn" title="Options">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
      </button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-record" id="recordBtn">
        <span class="dot"></span>
        <span id="recordLabel">Record</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn" disabled>Clear</button>
    </div>

    <!-- Steps -->
    <div class="steps-header">
      <span>Steps</span>
      <span id="stepCount">0</span>
    </div>

    <div class="steps-list" id="stepsList">
      <div class="empty" id="emptyMsg">
        Click <strong>Record</strong> then interact with any website.<br />Each action will appear
        here.
      </div>
    </div>

    <!-- Send panel (shown when steps > 0) -->
    <div class="send-panel" id="sendPanel" style="display: none">
      <input
        type="text"
        id="monitorName"
        placeholder="Monitor name (e.g. Login flow)"
        maxlength="255"
      />
      <div class="send-row">
        <button class="btn btn-primary" id="sendBtn">Send to WhatIsUp</button>
      </div>
    </div>

    <div class="status-msg" id="statusMsg" style="display: none"></div>

    <script src="popup.js"></script>
  </body>
</html>
